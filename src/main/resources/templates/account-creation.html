<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form method="POST" action="/account" th:object="${accountToCreate}">
        <table>
            <tr>
                <td>
                    <label for="account-name">Account name</label>
                </td>
                <td>
                    <input type="text" id="account-name" th:field="*{name}">
                </td>
                <td th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></td>
            </tr>
            <tr>
                <td>
                    <label for="account-start-balance">Start balance</label>
                </td>
                <td>
                    <input type="number" step="0.01" id="account-start-balance" th:field="*{currentBalance}">
                </td>
                <td th:if="${#fields.hasErrors('currentBalance')}" th:errors="*{currentBalance}"></td>
            </tr>
            <tr>
                <td>
                    <input type="submit">
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
