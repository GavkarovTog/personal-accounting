<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account name change</title>
</head>
<body>
    <form method="POST" th:action="@{/account/edit}" th:object="${accountToChange}">
        <table>
            <tr>
                <td>
                    <label for="account-name">Account name</label>
                </td>
                <td>
                    <input type="text" id="account-name" th:field="*{name}">
                </td>
                <td th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></td>
            </tr>
            <tr style="display: none;">
                <td>
                    <input type="text" id="account-current-balance" th:field="*{id}">
                </td>
                <td>
                    <input type="text" id="account-current-balance" th:field="*{currentBalance}">
                </td>
            </tr>
            <tr>
                <td>
                    <input type="submit">
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
