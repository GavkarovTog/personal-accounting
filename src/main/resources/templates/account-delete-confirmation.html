<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account delete confirmation</title>
</head>
<body>
    <form method="POST" th:action="@{/account/delete}" th:object="${accountToDelete}">
        <table>
            <tr th:text="|Are you sure you want to delete account - ${accountToDelete.getName()}?
                It will cause deletion of all operations on this account but transfers.
                Transfer results will be saved for counterparty account.|"></tr>
            <tr style="display: none;">
                <td>
                    <input type="text" id="account-id" th:field="*{id}">
                </td>
            </tr>
            <tr>
                <td>
                    <a th:href="@{/account}"><button form="">No</button></a>
                </td>
                <td>
                    <input type="submit" value="Yes">
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
